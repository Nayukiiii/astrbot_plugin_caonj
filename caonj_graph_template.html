<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script>
        {{ vis_js_content | safe }}
    </script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #FFF8FA 0%, #FFE8EF 100%);
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
        }
        #network-container {
            width: 100%; height: calc(100vh - 80px); position: relative;
        }
        .header {
            width: 100%; height: 80px;
            display: flex; align-items: center; justify-content: center;
            color: #FFFFFF; font-size: 28px; font-weight: bold;
            background: linear-gradient(135deg, #FFB7C5 0%, #E8806A 100%);
            z-index: 10; position: relative;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
            letter-spacing: 3px;
            box-shadow: 0 3px 0 #FFD6E0;
        }
        .header::before { content: '🌸'; position: absolute; left: 20px; font-size: 22px; opacity: 0.5; }
        .header::after { content: '🌸'; position: absolute; right: 20px; font-size: 22px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="header">🔥 群 {{ group_name }} 今日草宁隽图谱 🔥</div>
    <div id="network-container"></div>

    <script>
        const hourlyTag = new Date().toISOString().slice(0, 13);
        const raw_data = {{ records | tojson }};
        const user_map = {{ user_map | tojson }} || {};
        const NINGJUN_ID = "ningjun_center";
        const NINGJUN_LABEL = "宁隽";
        const nodes = [];
        const edges = [];
        const userSet = new Set();

        nodes.push({
            id: NINGJUN_ID, label: NINGJUN_LABEL,
            shape: 'ellipse', size: 80,
            color: { background: '#C85A7C', border: '#FFB7C5',
                     highlight: { background: '#FFB7C5', border: '#C85A7C' } },
            font: { color: '#FFFFFF', size: 44, bold: true, strokeWidth: 4, strokeColor: '#8B3A5A' },
            borderWidth: 6,
            shadow: { enabled: true, color: '#FFB7C5', size: 20, x: 0, y: 0 },
            fixed: false, mass: 5,
        });
        userSet.add(NINGJUN_ID);

        raw_data.forEach(r => {
            const uid = r.user_id;
            const uname = user_map[uid] || r.user_name || ("用户" + uid);
            if (!userSet.has(uid)) {
                userSet.add(uid);
                nodes.push({
                    id: uid, label: uname,
                    shape: 'circularImage',
                    image: `https://q4.qlogo.cn/headimg_dl?dst_uin=${uid}&spec=640&t=${hourlyTag}`,
                    borderWidth: 5, size: 90,
                    color: { border: '#C85A7C', background: '#FFF0F5' },
                    font: { color: '#4A3F4B', size: 42, vadjust: 38,
                            strokeWidth: 5, strokeColor: '#FFFFFF',
                            bold: { color: '#4A3F4B', size: 42, vadjust: 38 } }
                });
            }
            edges.push({
                from: uid, to: NINGJUN_ID, label: "草了",
                arrows: { to: { enabled: true, scaleFactor: 2.5, type: 'arrow' } },
                color: { color: '#C85A7C', opacity: 0.85 }, width: 3,
                font: { align: 'middle', color: '#C85A7C', size: 36, background: '#FFF8FA' },
                length: 600
            });
        });

        const container = document.getElementById('network-container');
        const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
        const options = {
            nodes: { shape: 'circularImage', font: { face: 'Microsoft YaHei' } },
            edges: { smooth: { type: 'curvedCW', roundness: 0.25 } },
            physics: {
                enabled: true,
                barnesHut: {
                    gravitationalConstant: -100000, centralGravity: 0.05,
                    springLength: 600, springConstant: 0.05, damping: 0.1, avoidOverlap: 1
                },
                stabilization: { enabled: true, iterations: {{ iterations }},
                    updateInterval: 25, onlyDynamicEdges: false, fit: true }
            },
            layout: { improvedLayout: true }
        };
        const network = new vis.Network(container, data, options);
        network.once("stabilizationIterationsDone", function () { network.fit(); });
    </script>
</body>
</html>
